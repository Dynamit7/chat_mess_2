syntax = "proto3";

message ChatMessage {
  int32 id = 1;
  int32 fromUserId = 2;
  int32 toUserId = 3;
  string text = 4; 
  string type = 5;
  string fileUrl = 6;
  string filename = 7;
  bool isRead = 8;
  string createdAt = 9;
  int32 replyToId = 10;
  message ReplyTo {
    int32 id = 1;
    string text = 2;
    int32 fromUserId = 3;
  }
  ReplyTo replyTo = 14;
  repeated Reaction reactions = 15;
}

message Reaction {
  int32 messageId = 1;
  int32 userId = 2;
  string emoji = 3;
}