# coturn — TURN/STUN сервер для WebRTC звонков
# Замени YOUR_SERVER_IP и YOUR_DOMAIN на свои значения

# Публичный IP сервера (обязательно!)
external-ip=YOUR_SERVER_IP

# Домен
realm=YOUR_DOMAIN

# Порты
listening-port=3478
tls-listening-port=5349

# SSL сертификат (тот же что у nginx)
cert=/etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem
pkey=/etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem

# Диапазон UDP портов для медиа (открой в firewall!)
min-port=49152
max-port=65535

# Логин и пароль (совпадают с TURN_USER/TURN_PASS в .env)
user=chatmess:TURN_PASSWORD_HERE

# Безопасность
no-multicast-peers
no-loopback-peers
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255

# Логи
log-file=/var/log/coturn/turn.log
verbose
