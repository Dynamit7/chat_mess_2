# ChatMess — продакшн nginx-конфиг для polat.digital
#
# Установка:
#   sudo cp polat.digital.conf /etc/nginx/sites-available/chatmess
#   sudo ln -s /etc/nginx/sites-available/chatmess /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo certbot --nginx -d polat.digital -d www.polat.digital -d admin.polat.digital
#   sudo nginx -t && sudo systemctl reload nginx
#
# Перед certbot строки ssl_certificate ниже можно оставить — certbot их перепишет.

# 4 инстанса PM2 (ip_hash = sticky sessions, обязательно для Socket.IO)
upstream chatmess_api {
    ip_hash;
    server 127.0.0.1:3000;
    server 127.0.0.1:3001;
    server 127.0.0.1:3002;
    server 127.0.0.1:3003;
    keepalive 64;
}

# ── HTTP → HTTPS ─────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name polat.digital www.polat.digital admin.polat.digital;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# ── Основной сайт: web-клиент + API ──────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name polat.digital www.polat.digital;

    ssl_certificate     /etc/letsencrypt/live/polat.digital/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/polat.digital/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    client_max_body_size 200m;
    proxy_read_timeout 300s;
    proxy_connect_timeout 10s;

    # WebSocket / Socket.IO
    location /socket.io/ {
        proxy_pass http://chatmess_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # REST API
    location /api/ {
        proxy_pass http://chatmess_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Auth
    location /auth/ {
        proxy_pass http://chatmess_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Файловые маршруты бэкенда (upload/file/health/Uploads/minio).
    # (/|$) — чтобы ловить и точные пути (POST /upload, /health), и с подпутём
    # (/file/<name>, /Uploads/<name>). Без этого /upload падал в статику → 405.
    location ~ ^/(minio|upload|file|health|Uploads)(/|$) {
        proxy_pass http://chatmess_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # Публичные объекты MinIO: ссылки вида https://polat.digital/my-bucket/<key>.
    # MINIO_PUBLIC_URL=https://polat.digital + бакет с public-read политикой.
    # Если поменяешь MINIO_BUCKET в .env — поменяй и путь здесь.
    # ^~ ОБЯЗАТЕЛЕН: без него файлы .png/.jpg/.css/.js перехватывает регулярка
    # статики ниже и отдаёт 404. ^~ запрещает проверять регулярки для этого пути.
    location ^~ /my-bucket/ {
        proxy_pass http://127.0.0.1:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    # /metrics закрыт снаружи
    location /metrics { deny all; return 403; }

    # web-клиент (Vite build → /var/www/chatmess/web)
    root /var/www/chatmess/web;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# ── Админка: admin.polat.digital ─────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name admin.polat.digital;

    ssl_certificate     /etc/letsencrypt/live/polat.digital/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/polat.digital/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 200m;

    # Админка тоже стучится в тот же API (через общий домен в VITE_API_URL),
    # но если нужно — можно проксировать /api и /socket.io и здесь.
    root /var/www/chatmess/admin;
    index index.html;
    location / { try_files $uri /index.html; }
}
