# ChatMess — nginx конфиг для продакшна
# Замени YOUR_DOMAIN на свой домен (например: defensy.com)
#
# Установка:
#   sudo cp nginx.conf /etc/nginx/sites-available/chatmess
#   sudo ln -s /etc/nginx/sites-available/chatmess /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d YOUR_DOMAIN -d www.YOUR_DOMAIN
#   sudo nginx -t && sudo systemctl reload nginx

# Upstream для 4 PM2 инстансов
# ip_hash = sticky sessions (один клиент всегда попадает на один инстанс — нужно для Socket.IO)
upstream chatmess_api {
    ip_hash;
    server 127.0.0.1:3000;
    server 127.0.0.1:3001;
    server 127.0.0.1:3002;
    server 127.0.0.1:3003;
    keepalive 64;
}

# HTTP → HTTPS редирект
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Основной HTTPS сервер
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # SSL (certbot заполнит автоматически)
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Безопасность
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Размер загрузки (видео/файлы)
    client_max_body_size 200m;

    # Таймауты для больших загрузок
    proxy_read_timeout 300s;
    proxy_connect_timeout 10s;

    # ── WebSocket / Socket.IO ───────────────────────────────────────────────
    location /socket.io/ {
        proxy_pass http://chatmess_api;
        proxy_http_version 1.1;

        # WebSocket upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Долгие polling соединения
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── REST API ────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://chatmess_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Кэш для GET запросов (не кэшируем POST/PUT/DELETE)
        proxy_cache_bypass $request_method;
    }

    # ── Auth ────────────────────────────────────────────────────────────────
    location /auth/ {
        proxy_pass http://chatmess_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Файлы (MinIO proxy, health, upload) ─────────────────────────────────
    location ~ ^/(minio|upload|file|health|Uploads)/ {
        proxy_pass http://chatmess_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # ── Prometheus /metrics — ЗАКРЫТ снаружи ─────────────────────────────
    location /metrics {
        deny all;
        return 403;
    }

    # ── Веб-приложение (React Vite build) ───────────────────────────────────
    # После сборки: npm run build в /web, копировать dist сюда
    root /var/www/chatmess/web;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }

    # Статика с долгим кэшем (JS/CSS/images с хэшем в имени)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

