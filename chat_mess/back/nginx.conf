# ============================================================================
#  Nginx — балансировщик нагрузки перед чат-сервером (Express + Socket.IO)
# ============================================================================
#
#  Назначение:
#    - распределяет трафик между несколькими процессами Node.js,
#      запущенными через PM2 (см. ecosystem.config.js) на портах
#      3000, 3001, 3002, 3003;
#    - обеспечивает sticky sessions (ip_hash) — критично для Socket.IO,
#      чтобы все запросы одного клиента (включая long-polling handshake)
#      попадали на ОДИН и тот же backend-процесс;
#    - корректно проксирует WebSocket (Upgrade/Connection заголовки).
#
#  Установка (Ubuntu):
#    sudo cp nginx.conf /etc/nginx/sites-available/chat
#    sudo ln -s /etc/nginx/sites-available/chat /etc/nginx/sites-enabled/chat
#    sudo nginx -t && sudo systemctl reload nginx
#
#  HTTPS: получите сертификат через certbot (sudo certbot --nginx -d ваш-домен)
#         — он сам допишет 443-блок. Ниже оставлен закомментированный пример.
# ============================================================================

# Пул backend-процессов Node.js (PM2 fork mode, increment_var: PORT)
upstream chat_backend {
    # ip_hash = sticky session по IP клиента. Один клиент всегда попадает
    # на тот же процесс, поэтому Socket.IO long-polling handshake не ломается.
    ip_hash;

    server 127.0.0.1:3000 max_fails=3 fail_timeout=15s;
    server 127.0.0.1:3001 max_fails=3 fail_timeout=15s;
    server 127.0.0.1:3002 max_fails=3 fail_timeout=15s;
    server 127.0.0.1:3003 max_fails=3 fail_timeout=15s;

    keepalive 64; # переиспользование соединений к backend
}

# Карта для апгрейда WebSocket-соединений
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;            # замените на ваш домен, напр. chat.example.com

    # Размер загружаемых файлов (у вас есть /upload больших медиа)
    client_max_body_size 100M;

    # ---- Socket.IO ----------------------------------------------------------
    # ВАЖНО: блок для /socket.io/ идёт первым и проксирует WebSocket.
    location /socket.io/ {
        proxy_pass http://chat_backend;
        proxy_http_version 1.1;

        # Заголовки для апгрейда до WebSocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket-соединения живут долго — увеличиваем таймауты,
        # иначе nginx будет рвать «тихие» соединения.
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
    }

    # ---- Остальной REST API + статика ---------------------------------------
    location / {
        proxy_pass http://chat_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Connection "";   # keepalive к backend
        proxy_read_timeout 120s;
    }
}

