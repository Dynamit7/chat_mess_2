syntax = "proto3";

package chat;

message Sender {
  int32 id = 1;
  string username = 2;
}

message GroupMessage {
  int32 id = 1;
  int32 group_id = 2;
  int32 user_id = 3;
  string text = 4;
  string type = 5;
  string file_url = 6;
  string filename = 7;
  int32 reply_to_id = 8;
  Sender sender = 9;
  bool is_deleted = 10;
  int64 created_at = 11;
  int64 updated_at = 12;
  GroupMessage replied_message = 13;
  string forwarded_from_type = 14;
  int32 forwarded_from_id = 15;
  string forwarded_from_username = 16;
}

message GroupMessageList {
  repeated GroupMessage messages = 1;
}