global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Сам Prometheus
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node.js backend — 4 PM2 инстанса (порты 3000-3003)
  - job_name: 'chatmess-backend'
    static_configs:
      - targets:
          - 'host.docker.internal:3000'
          - 'host.docker.internal:3001'
          - 'host.docker.internal:3002'
          - 'host.docker.internal:3003'
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Системные метрики сервера
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node_exporter:9100']   # внутри Docker сети порт всегда 9100

  # Redis метрики
  - job_name: 'redis'
    static_configs:
      - targets: ['redis_exporter:9121']
